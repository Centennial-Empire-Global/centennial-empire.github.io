<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centennial Empire Global</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Google Sans', 'Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'], },
          colors: {
            omega: {
              bg: '#0f0f0f', surface: '#1a1a1a', card: '#212121', border: '#2e2e2e',
              accent: '#8ab4f8', accentDark: '#4285f4', muted: '#9aa0a6', text: '#e8eaed',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f0f0f; color: #e8eaed; font-family: 'Google Sans', sans-serif; }
    .glass { background: rgba(33,33,33,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.07); }
    .gradient-text { background: linear-gradient(135deg, #8ab4f8 0%, #c58af9 50%, #8ab4f8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-primary { background: linear-gradient(135deg, #4285f4, #8ab4f8); transition: opacity 0.2s; }
  </style>
</head>
<body class="antialiased">

  <!-- Navigation -->
  <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full btn-primary flex items-center justify-center text-sm font-bold shadow-lg">C</div>
        <span class="font-semibold text-omega-text tracking-wide text-sm hidden sm:block">Centennial Empire Global</span>
      </div>
      <div class="flex items-center gap-6">
        <a href="#mission" class="text-sm text-omega-muted hover:text-omega-accent transition-colors">Mission</a>
        <a href="https://github.com/RAKESH-KUMAR-MAHANTA-CRYPTO/Shatabdi-Ka-Vimaan" target="_blank" class="text-sm text-omega-accent hover:text-white transition-colors">Library</a>
        <a href="#contact" class="text-sm text-omega-muted hover:text-omega-accent transition-colors">Contact</a>
        <a href="#cnt" class="btn-primary px-4 py-2 rounded-full text-sm font-medium">Join Pre-Sale</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="min-h-screen flex items-center justify-center pt-20">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <h1 class="text-6xl md:text-8xl font-bold mb-6 tracking-tight">
        <span class="text-omega-text">Centennial</span><br />
        <span class="gradient-text">Empire Global</span>
      </h1>
      <p class="text-xl text-omega-muted mb-12">Building tomorrow's infrastructure today.</p>
      <div class="flex gap-4 justify-center">
        <a href="#mission" class="btn-primary px-8 py-4 rounded-full font-semibold">Explore Our Mission</a>
      </div>
    </div>
  </section>

  <!-- Mission Section -->
  <section id="mission" class="py-24 px-6 bg-[#0f0f0f]">
    <div class="max-w-6xl mx-auto">
      <h2 class="text-5xl font-bold text-center mb-16">Revolutionizing <span class="gradient-text">Rural India</span></h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="glass rounded-2xl p-8 border border-omega-border">
          <h3 class="text-xl font-semibold mb-3 text-omega-text">Sipahi R1 Robotics</h3>
          <p class="text-omega-muted text-sm mb-4">Autonomous robots for agriculture and infrastructure.</p>
          <a href="https://ceg-command.emergent.host/" target="_blank" class="text-omega-accent text-sm font-medium hover:underline">Access Command Center →</a>
        </div>
        <!-- Add other cards similarly -->
      </div>
    </div>
  </section>

</body>
</html>
